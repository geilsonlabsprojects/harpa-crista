<!DOCTYPE html>
<html lang="pt-PT" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harpa Cristã Digital</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: system-ui, -apple-system, sans-serif;
            overscroll-behavior-y: contain;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.85);
        }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hidden-safe { display: none !important; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Ajuste para garantir rolagem em dispositivos móveis */
        #hymn-list {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        .lyric-stanza { font-weight: 400; }
        .lyric-chorus { font-weight: 800; color: #16a34a; }
        .dark .lyric-chorus { color: #4ade80; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 overflow-hidden flex flex-col h-screen">

    <!-- Navbar -->
    <header class="glass-panel sticky top-0 z-40 border-b border-gray-200 dark:border-gray-800 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="p-1.5 bg-primary-600 rounded-lg shadow-lg shadow-primary-500/20">
                <i data-lucide="book-open" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary-600 to-green-500 font-black">Harpa Digital</h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-header-download-audio" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition text-primary-600 hidden-safe" title="Transferir Áudios">
                <i data-lucide="cloud-download" class="w-5 h-5"></i>
            </button>
            <button id="btn-theme" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                <i data-lucide="moon" id="icon-theme" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-hidden relative w-full max-w-3xl mx-auto flex flex-col">
        
        <!-- Tela de Setup -->
        <section id="view-setup" class="flex-1 flex flex-col items-center justify-center p-6 text-center space-y-6 fade-in overflow-y-auto hidden-safe">
            <div class="w-24 h-24 bg-primary-100 dark:bg-primary-900/50 rounded-full flex items-center justify-center mb-2 animate-pulse">
                <i data-lucide="download-cloud" class="w-12 h-12 text-primary-600 dark:text-primary-400"></i>
            </div>
            <h2 class="text-3xl font-black">Configuração</h2>
            <p class="text-gray-600 dark:text-gray-400 max-w-md font-medium">
                Vamos baixar as letras para que possa ler os hinos mesmo sem internet.
            </p>
            
            <div id="setup-controls" class="w-full max-w-sm flex flex-col gap-4">
                <div class="flex items-start gap-3 bg-white dark:bg-gray-800 p-4 rounded-3xl border border-gray-200 dark:border-gray-700 text-left shadow-md">
                    <input type="checkbox" id="check-terms" class="mt-1 w-6 h-6 rounded-lg border-gray-300 text-primary-600 focus:ring-primary-500 bg-gray-100 dark:bg-gray-700 dark:border-gray-600 cursor-pointer">
                    <label for="check-terms" class="text-xs text-gray-600 dark:text-gray-400 cursor-pointer leading-relaxed">
                        Concordo com os <button onclick="openModal('modal-terms')" class="text-primary-600 dark:text-primary-400 underline font-bold">Termos</button> e a <button onclick="openModal('modal-privacy')" class="text-primary-600 dark:text-primary-400 underline font-bold">Privacidade</button>.
                    </label>
                </div>

                <button id="btn-start-download" disabled class="w-full bg-primary-600 hover:bg-primary-700 text-white font-black py-5 px-6 rounded-3xl shadow-xl transition transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3 text-lg opacity-50 cursor-not-allowed">
                    <i data-lucide="check-circle"></i>
                    Começar Agora

            <div id="download-progress-container" class="w-full max-w-sm hidden-safe space-y-4 text-left p-6 bg-white dark:bg-gray-800 rounded-[32px] shadow-2xl border border-gray-100 dark:border-gray-700">

                    <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-4 overflow-hidden mb-2">

                    <div class="flex justify-between text-[10px] uppercase font-bold text-gray-400 tracking-wider">

                </div>
            </div>
        </section>

        <!-- Tela Principal -->
        <section id="view-list" class="flex-1 flex flex-col hidden-safe fade-in h-full">
            <div class="p-4 bg-white dark:bg-gray-900 z-10 border-b border-gray-100 dark:border-gray-800 flex-shrink-0">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                    <input type="text" id="input-search" placeholder="Número ou nome do hino..." class="w-full pl-12 pr-4 py-4 bg-gray-100 dark:bg-gray-800 border-2 border-transparent focus:border-primary-500 rounded-2xl outline-none transition font-bold shadow-inner">
                </div>
                <div class="flex gap-2 mt-4 overflow-x-auto pb-1 hide-scrollbar">
                    <button class="filter-btn active px-6 py-2.5 rounded-xl bg-primary-600 text-white text-xs font-black shadow-lg shadow-primary-500/30 whitespace-nowrap" data-filter="all">TODOS</button>
                    <button class="filter-btn px-6 py-2.5 rounded-xl bg-gray-200 text-gray-700 dark:bg-gray-800 dark:text-gray-300 text-xs font-black whitespace-nowrap" data-filter="favorites">
                        FAVORITOS
                    </button>
                </div>
            </div>

            <!-- Lista com rolagem garantida -->
            <div id="hymn-list" class="flex-1 p-4 pb-32"></div>
        </section>

    </main>

    <!-- Mini Player -->
    <div id="mini-player" class="fixed bottom-0 w-full max-w-3xl left-1/2 transform -translate-x-1/2 glass-panel border-t border-gray-200 dark:border-gray-800 p-4 flex items-center justify-between gap-4 slide-up hidden-safe cursor-pointer z-40 shadow-[0_-10px_40px_rgba(0,0,0,0.15)] rounded-t-[32px]">
        <div class="flex items-center gap-3 flex-1 min-w-0" onclick="openFullPlayer()">
            <div class="w-12 h-12 bg-primary-600 text-white rounded-2xl flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-primary-500/30">
                <span id="mini-hymn-number">--</span>
            </div>
            <div class="flex flex-col flex-1 min-w-0">
                <p id="mini-hymn-title" class="font-black text-sm truncate uppercase tracking-tight">Escolha um hino</p>
                <div class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    <p class="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase">Disponível para ler</p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-mini-play" class="p-3.5 bg-primary-600 text-white rounded-full hover:bg-primary-700 transition shadow-lg hidden-safe">
                <i data-lucide="play" id="icon-mini-play" class="w-5 h-5 fill-current"></i>
            </button>
        </div>
    </div>

    <!-- Player Full -->
    <section id="view-player" class="fixed inset-0 z-50 bg-gray-50 dark:bg-gray-900 flex flex-col hidden-safe fade-in">
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800 glass-panel">
            <button onclick="closeFullPlayer()" class="p-3 rounded-2xl bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition">
                <i data-lucide="chevron-down" class="w-6 h-6"></i>
            </button>
            <div class="text-center flex-1 min-w-0">
                <p class="text-[10px] text-primary-600 font-black uppercase tracking-[0.2em] mb-0.5">Hino <span id="player-number">--</span></p>
                <h2 id="player-title" class="text-base font-black truncate px-6 uppercase">Título</h2>
            </div>
            <button id="btn-favorite" class="p-3 rounded-2xl transition">
                <i data-lucide="heart" id="icon-favorite" class="w-6 h-6 text-gray-400"></i>
            </button>
        </div>

        <!-- Letras com destaque -->
        <div id="player-lyrics" class="flex-1 overflow-y-auto p-10 text-xl leading-relaxed text-center whitespace-pre-wrap dark:text-gray-200"></div>

        <div id="player-controls" class="p-8 glass-panel border-t border-gray-200 dark:border-gray-800 rounded-t-[48px] shadow-2xl hidden-safe">
            <div class="flex items-center gap-4 mb-8">
                <span id="time-current" class="text-[10px] font-black font-mono text-gray-400">0:00</span>
                <input type="range" id="audio-progress" value="0" max="100" class="flex-1 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full appearance-none cursor-pointer accent-primary-600">
                <span id="time-total" class="text-[10px] font-black font-mono text-gray-400">0:00</span>
            </div>

            <div class="flex items-center justify-between max-w-md mx-auto">
                <button id="btn-share" class="p-4 text-gray-400 hover:text-primary-600 transition">
                    <i data-lucide="share-2" class="w-6 h-6"></i>
                </button>
                <div class="flex items-center gap-4">
                    <button id="btn-prev" class="p-4 text-gray-700 dark:text-gray-200 hover:text-primary-600 transition">
                        <i data-lucide="skip-back" class="w-8 h-8 fill-current"></i>
                    </button>
                    <button id="btn-play-main" class="p-7 bg-primary-600 text-white rounded-[32px] hover:bg-primary-700 transition transform hover:scale-110 shadow-2xl shadow-primary-500/50">
                        <i data-lucide="play" id="icon-play-main" class="w-8 h-8 fill-current"></i>
                    </button>
                    <button id="btn-next" class="p-4 text-gray-700 dark:text-gray-200 hover:text-primary-600 transition">
                        <i data-lucide="skip-forward" class="w-8 h-8 fill-current"></i>
                    </button>
                </div>
                <button id="btn-mute" class="p-4 text-gray-400 hover:text-primary-600 transition">
                    <i data-lucide="volume-2" id="icon-mute" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <div id="player-no-audio-warning" class="p-6 bg-primary-50 dark:bg-primary-900/20 border-t border-primary-100 dark:border-primary-800 text-center text-xs font-black text-primary-700 dark:text-primary-400 flex items-center justify-center gap-2 uppercase tracking-wide">
            <i data-lucide="music" class="w-4 h-4"></i>
            Áudio offline pode ser ativado no menu inicial
        </div>
    </section>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-[100] bg-black/70 backdrop-blur-md flex items-center justify-center hidden-safe p-6">
        <div class="bg-white dark:bg-gray-900 rounded-[40px] p-8 w-full max-w-md shadow-2xl relative max-h-[80vh] overflow-y-auto" id="modal-content">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 dark:hover:text-white p-2.5 bg-gray-100 dark:bg-gray-800 rounded-full transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Templates Legais -->
    <template id="template-terms">
        <h3 class="text-2xl font-black mb-4">Termos de Serviço</h3>
        <div class="space-y-4 text-gray-600 dark:text-gray-400 text-sm font-medium leading-relaxed">
            <p>1. <strong>Finalidade:</strong> Este app é uma ferramenta de auxílio para membros e músicos cristãos.</p>
            <p>2. <strong>Dados:</strong> Não coletamos informações. O download de hinos é feito para o seu próprio aparelho.</p>
            <p>3. <strong>Copyright:</strong> Respeitamos os direitos autorais. O conteúdo é para uso pessoal e religioso.</p>
        </div>
    </template>

    <template id="template-privacy">
        <h3 class="text-2xl font-black mb-4">Privacidade</h3>
        <div class="space-y-4 text-gray-600 dark:text-gray-400 text-sm font-medium leading-relaxed">
            <p><strong>Privacidade Total:</strong> O Harpa Digital funciona localmente. Seus hinos favoritos e configurações de tema nunca saem do seu telefone.</p>
            <p><strong>Transferência Segura:</strong> Os arquivos são baixados de servidores seguros e públicos.</p>
        </div>
    </template>

    <audio id="audio-player"></audio>

    <script>
        lucide.createIcons();

        const URL_AUDIO = "https://archive.org/cors/harpaopus/Harpa%28opus%29.zip";
        const URL_LETRAS = "https://archive.org/cors/harpa-letra/harpa-letra.zip";
        const DB_NAME = "HarpaCristaDB_V2";
        const STORE_HYMNS = "hymns";
        const STORE_AUDIO = "audio";

        const state = {
            hymns: [],
            favorites: new Set(JSON.parse(localStorage.getItem('harpa_favorites') || '[]')),
            currentHymnId: null,
            isPlaying: false,
            isMuted: false,
            filter: 'all',
            searchQuery: '',
            audioAvailable: localStorage.getItem('harpa_audio_downloaded') === 'true'
        };

        const audioEl = document.getElementById('audio-player');

        // --- DATABASE ---
        const dbPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                db.createObjectStore(STORE_HYMNS, { keyPath: 'number' });
                db.createObjectStore(STORE_AUDIO);
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });

        async function dbPut(storeName, data, key = null) {
            const db = await dbPromise;
            const tx = db.transaction(storeName, 'readwrite');
            key ? tx.objectStore(storeName).put(data, key) : tx.objectStore(storeName).put(data);
            return new Promise(r => tx.oncomplete = r);
        }

        async function dbGet(storeName, key) {
            const db = await dbPromise;
            return new Promise(r => {
                const req = db.transaction(storeName, 'readonly').objectStore(storeName).get(key);
                req.onsuccess = () => r(req.result);
            });
        }

        async function dbGetAll(storeName) {
            const db = await dbPromise;
            return new Promise(r => {
                const req = db.transaction(storeName, 'readonly').objectStore(storeName).getAll();
                req.onsuccess = () => r(req.result);
            });
        }

        async function dbCount(storeName) {
            const db = await dbPromise;
            return new Promise(r => {
                const req = db.transaction(storeName, 'readonly').objectStore(storeName).count();
                req.onsuccess = () => r(req.result);
            });
        }

        // --- MONITOR DE DOWNLOAD ---
        async function fetchWithProgress(url, onProgress) {
            const startTime = Date.now();
            const response = await fetch(url);
            const total = parseInt(response.headers.get('content-length') || 0, 10);
            let loaded = 0;
            const reader = response.body.getReader();
            const chunks = [];
            
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                loaded += value.length;
                
                const now = Date.now();
                const duration = (now - startTime) / 1000;
                const speed = loaded / duration; // bytes por segundo
                
                if(onProgress) onProgress(loaded, total, speed);
            }
            return new Blob(chunks);
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // --- INSTALAÇÃO ---
        const checkTerms = document.getElementById('check-terms');
        const btnStartDownload = document.getElementById('btn-start-download');

        checkTerms.onchange = (e) => {
            btnStartDownload.disabled = !e.target.checked;
            btnStartDownload.classList.toggle('opacity-50', !e.target.checked);
            btnStartDownload.classList.toggle('cursor-not-allowed', !e.target.checked);
        };

        btnStartDownload.onclick = async () => {
            document.getElementById('setup-controls').classList.add('hidden-safe');
            document.getElementById('download-progress-container').classList.remove('hidden-safe');
            
            const lblStatus = document.getElementById('lbl-status');
            const lblPct = document.getElementById('lbl-percentage');
            const lblSpeed = document.getElementById('lbl-speed');
            const lblSize = document.getElementById('lbl-size');
            const bar = document.getElementById('bar-progress');

            try {
                lblStatus.innerText = "Baixando letras...";
                const blob = await fetchWithProgress(URL_LETRAS, (l, t, s) => {
                    const p = Math.round((l/t)*100);
                    bar.style.width = p + '%';
                    lblPct.innerText = p + '%';
                    lblSpeed.innerText = formatBytes(s) + '/s';
                    lblSize.innerText = `${formatBytes(l)} / ${formatBytes(t)}`;
                });

                lblStatus.innerText = "A descompactar...";
                const zip = await JSZip.loadAsync(blob);
                const files = Object.keys(zip.files).filter(f => f.endsWith('.json'));
                
                for(let i=0; i<files.length; i++) {
                    const f = files[i];
                    const txt = await zip.files[f].async('string');
                    const json = JSON.parse(txt);
                    const numMatch = f.match(/\d+/);
                    if(numMatch) {
                        json.number = numMatch[0].padStart(3, '0');
                        await dbPut(STORE_HYMNS, json);
                    }
                    if(i % 50 === 0) lblStatus.innerText = `Guardando (${i}/${files.length})...`;
                }
                setTimeout(iniciarApp, 500);
            } catch(e) {
                alert("Falha no download. Verifique a internet.");
                document.getElementById('setup-controls').classList.remove('hidden-safe');
            }
        };

        // --- AUDIO DOWNLOAD ---
        async function openAudioInstaller() {
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="text-center p-2">
                    <h3 class="text-2xl font-black mb-4">BAIXAR ÁUDIOS</h3>
                    <p class="text-gray-500 text-sm mb-6 font-bold uppercase tracking-tight">Cerca de 100MB de áudio MP3 offline serão instalados no seu aparelho.</p>
                    <div id="audio-progress-box">
                        <div class="bg-gray-100 dark:bg-gray-800 p-6 rounded-3xl mb-6">
                             <div class="flex justify-between text-xs font-black mb-2">
                                <span id="a-status">PRONTO PARA INICIAR</span>
                                <span id="a-pct">0%</span>
                            </div>
                            <div class="w-full bg-gray-200 dark:bg-gray-700 h-3 rounded-full overflow-hidden mb-3">
                                <div id="a-bar" class="h-full bg-primary-500 w-0 transition-all"></div>
                            </div>
                            <div class="flex justify-between text-[9px] font-black text-gray-400">
                                <span id="a-speed">-- KB/s</span>
                                <span id="a-size">-- / --</span>
                            </div>
                        </div>
                        <button id="btn-start-audio" class="w-full py-5 bg-primary-600 text-white font-black rounded-2xl shadow-xl shadow-primary-600/30 active:scale-95 transition uppercase tracking-widest">Iniciar Transferência</button>
                    </div>
                </div>
            `;
            openModal('modal-generic');
            
            document.getElementById('btn-start-audio').onclick = async function() {
                this.classList.add('hidden-safe');
                const bar = document.getElementById('a-bar');
                const pct = document.getElementById('a-pct');
                const status = document.getElementById('a-status');
                const speedLbl = document.getElementById('a-speed');
                const sizeLbl = document.getElementById('a-size');

                try {
                    status.innerText = "BAIXANDO...";
                    const blob = await fetchWithProgress(URL_AUDIO, (l, t, s) => {
                        const p = Math.round((l/t)*100);
                        bar.style.width = p + '%';
                        pct.innerText = p + '%';
                        speedLbl.innerText = formatBytes(s) + '/s';
                        sizeLbl.innerText = `${formatBytes(l)} / ${formatBytes(t)}`;
                    });
                    
                    status.innerText = "INSTALANDO...";
                    const zip = await JSZip.loadAsync(blob);
                    const audioFiles = Object.keys(zip.files).filter(f => !zip.files[f].dir);
                    
                    for(let i=0; i<audioFiles.length; i++) {
                        const f = audioFiles[i];
                        const num = f.match(/\d+/)?.[0]?.padStart(3, '0');
                        if(num) {
                            const audioBlob = await zip.files[f].async('blob');
                            await dbPut(STORE_AUDIO, audioBlob, num);
                        }
                        if(i%20 === 0) status.innerText = `INSTALANDO (${i}/${audioFiles.length})`;
                    }
                    
                    localStorage.setItem('harpa_audio_downloaded', 'true');
                    state.audioAvailable = true;
                    status.innerText = "SUCESSO!";
                    setTimeout(() => {
                        closeModal();
                        document.getElementById('btn-header-download-audio').classList.add('hidden-safe');
                        if(state.currentHymnId) carregarHino(state.currentHymnId);
                    }, 1000);
                } catch(e) {
                    status.innerText = "ERRO NO DOWNLOAD";
                }
            };
        }
        document.getElementById('btn-header-download-audio').onclick = openAudioInstaller;

        // --- UI & RENDER ---
        async function inicializar() {
            const count = await dbCount(STORE_HYMNS);
            if(count > 0) iniciarApp();
            else document.getElementById('view-setup').classList.remove('hidden-safe');
        }

        async function iniciarApp() {
            document.getElementById('view-setup').classList.add('hidden-safe');
            document.getElementById('view-list').classList.remove('hidden-safe');
            if(!state.audioAvailable) document.getElementById('btn-header-download-audio').classList.remove('hidden-safe');
            
            state.hymns = await dbGetAll(STORE_HYMNS);
            state.hymns.sort((a,b) => parseInt(a.number) - parseInt(b.number));
            renderHymns();
        }

        function renderHymns() {
            const list = document.getElementById('hymn-list');
            list.innerHTML = "";
            const q = state.searchQuery.toLowerCase();
            
            const filtered = state.hymns.filter(h => {
                const match = h.number.includes(q) || h.title.toLowerCase().includes(q);
                return state.filter === 'favorites' ? (match && state.favorites.has(h.number)) : match;
            });

            filtered.forEach(h => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-4 p-5 mb-4 bg-white dark:bg-gray-800 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700 active:scale-95 transition cursor-pointer";
                item.onclick = () => carregarHino(h.number);
                item.innerHTML = `
                    <div class="w-12 h-12 bg-primary-50 dark:bg-primary-900/20 text-primary-600 rounded-2xl flex items-center justify-center font-black shadow-inner">${h.number}</div>
                    <div class="flex-1 truncate font-black text-sm uppercase tracking-tight">${h.title}</div>
                    <button onclick="event.stopPropagation(); toggleFav('${h.number}')" class="p-2">
                        <i data-lucide="heart" class="w-5 h-5 ${state.favorites.has(h.number) ? 'fill-primary-500 text-primary-500' : 'text-gray-300'}"></i>
                    </button>
                `;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        document.getElementById('input-search').oninput = (e) => { state.searchQuery = e.target.value; renderHymns(); };
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.className = "filter-btn px-6 py-2.5 rounded-xl bg-gray-200 text-gray-700 dark:bg-gray-800 dark:text-gray-300 text-xs font-black whitespace-nowrap");
                btn.className = "filter-btn active px-6 py-2.5 rounded-xl bg-primary-600 text-white text-xs font-black shadow-lg shadow-primary-500/30 whitespace-nowrap";
                state.filter = btn.dataset.filter;
                renderHymns();
            };
        });

        // --- PLAYER LOGIC ---
        let audioUrl = null;
        async function carregarHino(num) {
            state.currentHymnId = num;
            const h = state.hymns.find(x => x.number === num);
            document.getElementById('mini-hymn-number').innerText = h.number;
            document.getElementById('mini-hymn-title').innerText = h.title;
            document.getElementById('player-number').innerText = h.number;
            document.getElementById('player-title').innerText = h.title;
            
            let lyricsHtml = "";
            if(h.lyrics?.paragraphs) {
                lyricsHtml = h.lyrics.paragraphs.map(p => {
                    const isChorus = p.text.toLowerCase().includes("coro") || p.text.toLowerCase().includes("refrão");
                    const cssClass = isChorus ? 'lyric-chorus' : 'lyric-stanza';
                    return `<div class="mb-8 ${cssClass}">${p.text}</div>`;
                }).join("");
            } else {
                lyricsHtml = `<p class="italic text-gray-400">Letra indisponível.</p>`;
            }
            document.getElementById('player-lyrics').innerHTML = lyricsHtml;
            document.getElementById('player-lyrics').scrollTop = 0;

            updateFavBtn();

            const audioBlob = state.audioAvailable ? await dbGet(STORE_AUDIO, num) : null;
            const controls = document.getElementById('player-controls');
            const warning = document.getElementById('player-no-audio-warning');
            const miniPlay = document.getElementById('btn-mini-play');

            if(audioBlob) {
                if(audioUrl) URL.revokeObjectURL(audioUrl);
                audioUrl = URL.createObjectURL(audioBlob);
                audioEl.src = audioUrl;
                controls.classList.remove('hidden-safe');
                warning.classList.add('hidden-safe');
                miniPlay.classList.remove('hidden-safe');
                play();
            } else {
                audioEl.pause();
                audioEl.src = "";
                controls.classList.add('hidden-safe');
                warning.classList.remove('hidden-safe');
                miniPlay.classList.add('hidden-safe');
                state.isPlaying = false;
                updatePlayIcons();
            }

            document.getElementById('mini-player').classList.remove('hidden-safe');
            openFullPlayer();
        }

        function play() { audioEl.play(); state.isPlaying = true; updatePlayIcons(); }
        function pause() { audioEl.pause(); state.isPlaying = false; updatePlayIcons(); }
        function updatePlayIcons() {
            const mini = document.getElementById('icon-mini-play');
            const main = document.getElementById('icon-play-main');
            const name = state.isPlaying ? 'pause' : 'play';
            mini.setAttribute('data-lucide', name);
            main.setAttribute('data-lucide', name);
            lucide.createIcons();
        }

        document.getElementById('btn-play-main').onclick = () => state.isPlaying ? pause() : play();
        document.getElementById('btn-mini-play').onclick = (e) => { e.stopPropagation(); state.isPlaying ? pause() : play(); };

        document.getElementById('btn-mute').onclick = () => {
            state.isMuted = !state.isMuted;
            audioEl.muted = state.isMuted;
            document.getElementById('icon-mute').setAttribute('data-lucide', state.isMuted ? 'volume-x' : 'volume-2');
            document.getElementById('btn-mute').classList.toggle('text-red-500', state.isMuted);
            lucide.createIcons();
        };

        audioEl.ontimeupdate = () => {
            if(!audioEl.duration) return;
            const p = (audioEl.currentTime/audioEl.duration)*100;
            document.getElementById('audio-progress').value = p;
            document.getElementById('time-current').innerText = formatTime(audioEl.currentTime);
            document.getElementById('time-total').innerText = formatTime(audioEl.duration);
        };
        document.getElementById('audio-progress').oninput = (e) => {
            if(audioEl.duration) audioEl.currentTime = (e.target.value/100)*audioEl.duration;
        };

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        document.getElementById('btn-next').onclick = () => {
            const idx = state.hymns.findIndex(h => h.number === state.currentHymnId);
            if(idx < state.hymns.length - 1) carregarHino(state.hymns[idx+1].number);
        };
        document.getElementById('btn-prev').onclick = () => {
            const idx = state.hymns.findIndex(h => h.number === state.currentHymnId);
            if(idx > 0) carregarHino(state.hymns[idx-1].number);
        };

        function toggleFav(n) {
            state.favorites.has(n) ? state.favorites.delete(n) : state.favorites.add(n);
            localStorage.setItem('harpa_favorites', JSON.stringify([...state.favorites]));
            renderHymns();
            if(state.currentHymnId === n) updateFavBtn();
        }
        function updateFavBtn() {
            const icon = document.getElementById('icon-favorite');
            const is = state.favorites.has(state.currentHymnId);
            icon.className = `w-6 h-6 transition ${is ? 'fill-primary-500 text-primary-500' : 'text-gray-400'}`;
        }
        document.getElementById('btn-favorite').onclick = () => toggleFav(state.currentHymnId);

        // --- MODAL SYSTEM ---
        function openModal(id) {
            const container = document.getElementById('modal-container');
            const body = document.getElementById('modal-body');
            if(id === 'modal-terms') body.innerHTML = document.getElementById('template-terms').innerHTML;
            else if(id === 'modal-privacy') body.innerHTML = document.getElementById('template-privacy').innerHTML;
            container.classList.remove('hidden-safe');
            lucide.createIcons();
        }
        function closeModal() { document.getElementById('modal-container').classList.add('hidden-safe'); }

        function openFullPlayer() { document.getElementById('view-player').classList.remove('hidden-safe'); }
        function closeFullPlayer() { document.getElementById('view-player').classList.add('hidden-safe'); }

        // --- THEME ---
        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('icon-theme').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }
        document.getElementById('btn-theme').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('icon-theme').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        };

        initTheme();
        document.addEventListener('DOMContentLoaded', inicializar);
    </script>
</body>
</html>
